<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>糖尿病共照網 - 授權啟動中</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
</head>
<body>
    <div style="text-align: center; margin-top: 50px;">
        <h2>正在連接糖尿病共照網授權伺服器...</h2>
        <p>請稍候，系統正在進行 OAuth 驗證轉址。</p>
    </div>

    <script>
        // SMART on FHIR 啟動設定
        FHIR.oauth2.authorize({
            "client_id": "YOUR_CLIENT_ID_HERE", // 替換為你的 Client ID
            "scope": "openid profile user/*.read patient/*.read launch", 
            "redirect_uri": "index.html", // 授權後跳轉回來的頁面
            "completeInTarget": true
        });
    </script>
</body>
</html>
