<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糖尿病共照網品質儀表板</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface-2: #f8fafc;
    --border: #e2e8f0;
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --accent-blue: #2563eb;
    --accent-teal: #0d9488;
    --accent-red: #dc2626;
    --accent-amber: #d97706;
    --accent-green: #16a34a;
    --nav-bg: #0f172a;
    --card-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    --card-shadow-hover: 0 4px 12px rgba(0,0,0,0.1), 0 8px 32px rgba(0,0,0,0.06);
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
  }

  .fade-in { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .stagger-1 { animation-delay: 0.05s; opacity: 0; }
  .stagger-2 { animation-delay: 0.12s; opacity: 0; }
  .stagger-3 { animation-delay: 0.19s; opacity: 0; }
  .stagger-4 { animation-delay: 0.26s; opacity: 0; }

  .spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent-blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .nav-bar {
    background: var(--nav-bg);
    position: sticky; top: 0; z-index: 40;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
  }

  .patient-card, .metric-card, .card, .cds-panel, .edu-card {
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
    box-shadow: var(--card-shadow);
  }

  .metric-card:hover { transform: translateY(-2px); box-shadow: var(--card-shadow-hover); }

  .cds-panel { background: var(--nav-bg); border: 1px solid rgba(255,255,255,0.08); }
  .cds-item { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07); }

  .edu-item { background: #f0fdf4; border: 1px solid #bbf7d0; }
  .edu-item:hover { background: #dcfce7; }

  .tab-btn.active { background: #0d9488 !important; color: white !important; border-color: #0d9488 !important; }

  .obs-table th { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
  .obs-row:hover { background: var(--surface-2); }

  .badge { padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 600; }
  .badge-red    { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
  .badge-amber  { background: #fffbeb; color: #d97706; border: 1px solid #fde68a; }
  .badge-green  { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
  .badge-blue   { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
  .badge-gray   { background: #f8fafc; color: #64748b; border: 1px solid #e2e8f0; }

  .error-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 16px; }

  .value-display { font-family: 'DM Mono', monospace; font-weight: 500; line-height: 1; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    background: #22c55e;
    box-shadow: 0 0 0 0 rgba(34,197,94,0.6);
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%   { box-shadow: 0 0 0 0 rgba(34,197,94,0.6); }
    70%  { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
    100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
</style>
</head>

<body>

<!-- Nav -->
<nav class="nav-bar">
  <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center flex-shrink-0">
        <i class="fa-solid fa-heart-pulse text-white text-sm"></i>
      </div>
      <span class="text-white font-semibold text-sm tracking-tight">糖尿病共照網品質儀表板</span>
    </div>
    <div class="flex items-center gap-2 text-xs text-slate-400">
      <span class="status-dot"></span>
      <span class="font-mono">SMART on FHIR R4</span>
    </div>
  </div>
</nav>

<main class="max-w-7xl mx-auto py-8 px-4 sm:px-6">

  <!-- 載入中 -->
  <div id="loading" class="flex flex-col items-center justify-center py-32 gap-5">
    <div class="spinner"></div>
    <div class="text-center">
      <p class="text-slate-700 font-medium">正在連接 SMART 沙盒...</p>
      <p class="mt-1 text-xs text-slate-400 font-mono" id="loading-detail">初始化 FHIR Client</p>
    </div>
  </div>

  <!-- 錯誤顯示 -->
  <div id="error-box" class="hidden error-box max-w-lg mx-auto mt-20 p-8 text-center">
    <div class="w-14 h-14 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-4">
      <i class="fa-solid fa-circle-exclamation text-2xl text-red-500"></i>
    </div>
    <h2 class="text-lg font-bold text-red-800 mb-2">資料讀取失敗</h2>
    <p id="error-msg" class="text-sm text-red-600 leading-relaxed"></p>
    <div id="error-detail" class="mt-4 text-xs text-red-500 font-mono break-all"></div>
    <a href="https://launch.smarthealthit.org/" target="_blank"
       class="inline-flex items-center gap-2 mt-6 px-5 py-2.5 bg-red-600 text-white rounded-lg text-sm font-medium hover:bg-red-700 transition-colors">
      <i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>
      重新透過 SMART Launcher 啟動
    </a>
  </div>

  <!-- 主要內容 -->
  <div id="content" class="hidden">

    <!-- 病人卡片 -->
    <div class="patient-card mb-7 fade-in stagger-1">
      <div class="patient-card-banner bg-gradient-to-r from-blue-600 via-teal-500 to-green-500 h-2"></div>
      <div class="p-6 flex flex-wrap items-center gap-5">
        <div id="avatar-box" class="w-16 h-16 rounded-2xl flex items-center justify-center text-white text-2xl bg-blue-600 flex-shrink-0 shadow-md">
          <i class="fa-solid fa-user"></i>
        </div>
        <div class="flex-1 min-w-0">
          <h1 class="text-2xl font-bold text-slate-900 truncate" id="ui-name">讀取中...</h1>
          <div class="flex flex-wrap gap-3 mt-2">
            <span class="badge badge-blue"><i class="fa-solid fa-fingerprint text-[10px]"></i> <span id="ui-id" class="font-mono">—</span></span>
            <span class="badge badge-gray" id="ui-gender-badge">—</span>
            <span class="badge badge-gray"><span id="ui-age">—</span> 歲</span>
            <span class="badge badge-gray"><i class="fa-solid fa-calendar-days text-[10px]"></i> <span id="ui-dob">—</span></span>
          </div>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- 左欄 -->
      <div class="lg:col-span-2 space-y-6">

        <!-- 指標卡片 -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 fade-in stagger-2">
          <!-- HbA1c -->
          <div class="metric-card">
            <div class="metric-accent bg-blue-600 h-1" id="hba1c-accent"></div>
            <div class="p-5">
              <p class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-4"><i class="fa-solid fa-droplet mr-1 text-blue-500"></i>HbA1c</p>
              <div class="flex items-baseline gap-1 mb-2">
                <span class="value-display text-4xl text-slate-900" id="ui-hba1c">—</span>
                <span class="text-lg text-slate-400 font-light">%</span>
              </div>
              <p class="text-xs font-semibold" id="ui-hba1c-msg"></p>
              <p class="text-xs text-slate-400 mt-1" id="ui-hba1c-date"></p>
            </div>
          </div>

          <!-- 眼底檢查 -->
          <div class="metric-card">
            <div class="metric-accent bg-orange-500 h-1"></div>
            <div class="p-5">
              <p class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-4"><i class="fa-solid fa-eye mr-1 text-orange-500"></i>眼底檢查</p>
              <span class="text-base font-bold block" id="ui-eye-status">查詢中...</span>
              <p class="text-xs text-slate-400 mt-3" id="ui-eye-date"></p>
            </div>
          </div>

          <!-- 足部檢查 -->
          <div class="metric-card">
            <div class="metric-accent bg-violet-500 h-1"></div>
            <div class="p-5">
              <p class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-4"><i class="fa-solid fa-shoe-prints mr-1 text-violet-500"></i>足部檢查</p>
              <span class="text-base font-bold block" id="ui-foot-status">查詢中...</span>
              <p class="text-xs text-slate-400 mt-3" id="ui-foot-date"></p>
            </div>
          </div>
        </div>

        <!-- 趨勢圖 -->
        <div class="card p-6 fade-in stagger-3">
          <div class="flex items-start justify-between mb-4">
            <div>
              <h3 class="font-semibold text-slate-800">HbA1c 歷史趨勢</h3>
              <p class="text-xs text-slate-400">近四次檢測結果（%）</p>
            </div>
          </div>
          <canvas id="trendChart" height="100"></canvas>
        </div>

        <!-- 近期檢驗 -->
        <div class="card p-6 fade-in stagger-4">
          <h3 class="font-semibold text-slate-800 mb-4">近期檢驗紀錄</h3>
          <div id="obs-table" class="text-sm">
            <p class="text-slate-400">載入中...</p>
          </div>
        </div>

      </div>

      <!-- 右欄 -->
      <div class="space-y-5">

        <!-- CDS -->
        <div class="cds-panel p-5 fade-in stagger-2">
          <div class="flex items-center gap-2 mb-4">
            <i class="fa-solid fa-brain text-blue-400"></i>
            <span class="text-xs font-bold text-blue-400 uppercase tracking-widest">Clinical Decision Support</span>
          </div>
          <div id="ui-suggestions" class="space-y-3 text-sm text-slate-300"></div>
        </div>

        <!-- 衛教 -->
        <div class="edu-card p-5 fade-in stagger-3">
          <div class="flex items-center gap-2 mb-4">
            <i class="fa-solid fa-book-open text-teal-600"></i>
            <h3 class="font-semibold text-teal-700">糖尿病衛教專區</h3>
          </div>
          <div id="education-content" class="space-y-3"></div>
          <button onclick="showEducationModal()" 
                  class="mt-4 w-full bg-teal-600 text-white py-2.5 rounded-xl hover:bg-teal-700 text-sm font-semibold">
            查看完整衛教資源庫
          </button>
        </div>

      </div>
    </div>
  </div>
</main>

<!-- 衛教 Modal（保持原樣，內容較長，此處省略以節省空間，如需完整可保留你原本的 Modal 部分） -->
<!-- ...（你的原有 education-modal 內容保持不變）... -->

<footer class="text-center text-slate-400 text-xs py-8 mt-6">
  <p>© 2026 糖尿病共照網品質監測系統</p>
  <p class="mt-1 font-mono text-[11px]">Powered by FHIR R4 &amp; SMART on FHIR</p>
</footer>

<script>
let currentChart = null;

function setLoading(msg) {
  document.getElementById('loading-detail').textContent = msg;
}

function showError(msg, detail = '') {
  document.getElementById('loading').classList.add('hidden');
  const box = document.getElementById('error-box');
  box.classList.remove('hidden');
  document.getElementById('error-msg').innerHTML = msg;
  document.getElementById('error-detail').textContent = detail;
  console.error('App Error:', msg, detail);
}

// 主要初始化
async function initApp() {
  console.log('🚀 index.html 初始化開始');
  console.log('Current URL:', window.location.href);
  console.log('SessionStorage keys:', Object.keys(sessionStorage));

  try {
    setLoading('等待 FHIR OAuth 完成...');

    // 重要：使用 fhirclient 官方方式完成授權流程
    const client = await FHIR.oauth2.ready();
    console.log('✅ FHIR Client 就緒', client);

    setLoading('讀取病人資料...');
    const patient = await client.patient.read();
    console.log('✅ Patient 資料:', patient);

    // 顯示主要內容
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('content').classList.remove('hidden');

    // 病人基本資訊
    const nameObj = patient.name?.[0] || {};
    const displayName = nameObj.text || [nameObj.family, ...(nameObj.given || [])].filter(Boolean).join(' ') || '未知姓名';
    document.getElementById('ui-name').textContent = displayName;
    document.getElementById('ui-id').textContent = patient.id || '—';

    const genderText = patient.gender === 'male' ? '男' : patient.gender === 'female' ? '女' : '不詳';
    document.getElementById('ui-gender-badge').textContent = genderText;
    document.getElementById('ui-age').textContent = calcAge(patient.birthDate);
    document.getElementById('ui-dob').textContent = patient.birthDate ? patient.birthDate.slice(0,10) : '不詳';

    // HbA1c 查詢（含 fallback）
    let hba1cValue = null, hba1cDate = '', hba1cHistory = [];
    try {
      const obsBundle = await client.request('Observation?code=4548-4&_sort=-date&_count=10', { flat: false });
      const obsList = (obsBundle?.entry || []).map(e => e.resource).filter(Boolean);
      if (obsList.length > 0) {
        const sorted = obsList.sort((a,b) => new Date(b.effectiveDateTime || b.issued) - new Date(a.effectiveDateTime || a.issued));
        hba1cValue = sorted[0].valueQuantity?.value ?? null;
        hba1cDate = sorted[0].effectiveDateTime || sorted[0].issued || '';
        hba1cHistory = sorted.slice(0,4).map(o => o.valueQuantity?.value).filter(v => v != null);
      }
    } catch(e) { console.warn('HbA1c query error:', e); }

    // 更新 HbA1c UI
    if (hba1cValue !== null) {
      document.getElementById('ui-hba1c').textContent = hba1cValue.toFixed(1);
      const msgEl = document.getElementById('ui-hba1c-msg');
      const accent = document.getElementById('hba1c-accent');
      if (hba1cValue > 8) {
        msgEl.textContent = '顯著偏高，需積極處置';
        msgEl.className = 'text-xs font-semibold text-red-600';
        accent.className = 'metric-accent bg-red-500 h-1';
      } else if (hba1cValue > 7) {
        msgEl.textContent = '高於目標值';
        msgEl.className = 'text-xs font-semibold text-amber-600';
        accent.className = 'metric-accent bg-amber-500 h-1';
      } else {
        msgEl.textContent = '控制良好 ✓';
        msgEl.className = 'text-xs font-semibold text-green-600';
        accent.className = 'metric-accent bg-green-500 h-1';
      }
      document.getElementById('ui-hba1c-date').textContent = hba1cDate ? '最後測定：' + hba1cDate.slice(0,10) : '';
    } else {
      document.getElementById('ui-hba1c').textContent = 'N/A';
      document.getElementById('ui-hba1c-msg').textContent = '目前無 HbA1c 資料';
    }

    updateEducationSection(hba1cValue);
    updateCDS(hba1cValue);

    // 趨勢圖
    const chartData = hba1cHistory.length ? hba1cHistory.reverse() : [6.5, 7.0, 7.2, hba1cValue || 6.8];
    updateChart(chartData, hba1cValue > 7.5 ? '#ef4444' : hba1cValue > 7 ? '#f59e0b' : '#22c55e');

    // 眼底與足部檢查
    await queryExam(client, { codes: ['29272-0','57127-0','24583-0'], statusId: 'ui-eye-status', dateId: 'ui-eye-date', label: '眼底檢查', months: 12 });
    await queryExam(client, { codes: ['54397-6','59774-9'], statusId: 'ui-foot-status', dateId: 'ui-foot-date', label: '足部檢查', months: 12 });

    // 近期檢驗列表
    await loadObsTable(client);

  } catch (err) {
    console.error('❌ initApp 錯誤:', err);
    let msg = '讀取失敗，請重新透過 SMART Launcher 啟動。';
    let detail = err.message || String(err);
    if (detail.includes('state') || detail.includes('No \'state\' parameter')) {
      msg = '缺少 state 參數，請重新從 launch.html 啟動。';
    } else if (detail.includes('code')) {
      msg = '授權 code 交換失敗，請確認 redirect_uri 與 launch 流程正確。';
    }
    showError(msg, detail);
  }
}

// 其餘函式（calcAge, formatDate, queryExam, loadObsTable, updateEducationSection, updateCDS, updateChart, modal 函式）保持你原本的版本
// 為了完整性，這裡只列出關鍵修改部分。如果你需要我把完整包含所有函式的版本貼上，請告訴我。

// 啟動
window.onload = initApp;
</script>
</body>
</html>
