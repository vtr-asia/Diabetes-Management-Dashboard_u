<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>糖尿病共照網 - 專業品質管理儀表板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-body: #f8fafc;
            --sidebar-width: 260px;
            --card-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', "PingFang TC", sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* 側邊導覽列 */
        aside {
            width: var(--sidebar-width);
            background: white;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .sidebar-header {
            padding: 24px;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        nav { flex: 1; padding: 12px; }
        nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            text-decoration: none;
            color: var(--text-muted);
            border-radius: 8px;
            transition: all 0.2s;
            margin-bottom: 4px;
        }
        nav a.active, nav a:hover {
            background-color: var(--primary-light);
            color: var(--primary);
        }

        /* 主內容區 */
        main {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 32px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        /* 病患資訊精簡化 */
        .patient-summary {
            background: white;
            padding: 20px 24px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
        }
        .avatar-circle {
            width: 48px; height: 48px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        /* 數據指標卡片優化 */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        .metric-card {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            border: 1px solid #f1f5f9;
        }
        .metric-header {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 12px;
        }
        .metric-value-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 16px;
        }
        .value-large { font-size: 2rem; font-weight: 700; }
        .unit { color: var(--text-muted); }
        
        .status-tag {
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .tag-good { background: #dcfce7; color: #15803d; }
        .tag-warn { background: #fef3c7; color: #92400e; }
        .tag-danger { background: #fee2e2; color: #b91c1c; }

        .chart-container { height: 60px; margin-top: 10px; }

        /* 衛教區塊 */
        .section-card {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
        }
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .edu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }
        .edu-item {
            padding: 16px;
            border: 1px solid #f1f5f9;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .edu-item:hover { border-color: var(--primary); background: var(--primary-light); }
        .edu-item i { color: var(--primary); margin-bottom: 12px; display: block; }
        .edu-item h4 { font-size: 0.95rem; margin-bottom: 4px; }

        /* Modal 優化 */
        #edu-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); z-index: 100; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-body {
            background: white; width: 90%; max-width: 500px; padding: 32px; border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        #loading-overlay {
            position: fixed; inset: 0; background: white; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .loader {
            width: 48px; height: 48px; border: 5px solid var(--primary-light);
            border-bottom-color: var(--primary); border-radius: 50%;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="loader"></div>
    <p style="margin-top: 16px; color: var(--text-muted);">正在同步臨床數據...</p>
</div>

<aside>
    <div class="sidebar-header">
        <i class="fas fa-notes-medical"></i>
        <span>DM Care Pro</span>
    </div>
    <nav>
        <a href="#" class="active"><i class="fas fa-th-large"></i> 儀表板</a>
        <a href="#"><i class="fas fa-user-md"></i> 臨床記錄</a>
        <a href="#"><i class="fas fa-chart-line"></i> 趨勢分析</a>
        <a href="#"><i class="fas fa-cog"></i> 設定</a>
    </nav>
</aside>

<main>
    <div class="top-bar">
        <div>
            <h1 style="font-size: 1.5rem; font-weight: 700;">品質管理總覽</h1>
            <p style="color: var(--text-muted); font-size: 0.875rem;">數據更新於：<span id="update-time">--</span></p>
        </div>
        <div id="auth-status" class="status-tag" style="background: #e2e8f0;">驗證中</div>
    </div>

    <div class="patient-summary">
        <div class="avatar-circle"><i class="fas fa-user"></i></div>
        <div>
            <h2 id="patient-name" style="font-size: 1.1rem; margin-bottom: 2px;">讀取中...</h2>
            <p id="patient-id" style="font-size: 0.8rem; color: var(--text-muted);">FHIR ID: --</p>
        </div>
        <div style="margin-left: auto; text-align: right;">
            <div class="status-tag tag-good">個案管理中</div>
        </div>
    </div>

    <div class="metrics-grid">
        <div class="metric-card">
            <div class="metric-header">
                <span>糖化血色素 (HbA1c)</span>
                <span class="status-tag tag-good">達標</span>
            </div>
            <div class="metric-value-row">
                <span id="hba1c-val" class="value-large">--</span>
                <span class="unit">%</span>
            </div>
            <div class="chart-container"><canvas id="hba1cChart"></canvas></div>
        </div>

        <div class="metric-card">
            <div class="metric-header">
                <span>眼底檢查率</span>
                <span class="status-tag tag-warn">待預約</span>
            </div>
            <div class="metric-value-row">
                <span id="eye-val" class="value-large">--</span>
                <span class="unit">%</span>
            </div>
            <div class="chart-container"><canvas id="eyeChart"></canvas></div>
        </div>

        <div class="metric-card">
            <div class="metric-header">
                <span>尿液微量白蛋白 (UACR)</span>
                <span class="status-tag tag-danger">追蹤中</span>
            </div>
            <div class="metric-value-row">
                <span id="acr-val" class="value-large">--</span>
                <span class="unit">%</span>
            </div>
            <div class="chart-container"><canvas id="acrChart"></canvas></div>
        </div>
    </div>

    <div class="section-card">
        <div class="section-title">
            <i class="fas fa-lightbulb" style="color: var(--warning);"></i> 個別化衛教建議
        </div>
        <div class="edu-grid" id="edu-grid">
            </div>
    </div>
</main>

<div id="edu-modal">
    <div class="modal-body">
        <h3 id="modal-title" style="margin-bottom: 16px; color: var(--primary);"></h3>
        <div id="modal-content" style="color: var(--text-main); line-height: 1.7; font-size: 0.95rem;"></div>
        <button onclick="closeModal()" style="margin-top: 24px; width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">確定</button>
    </div>
</div>

<script>
    // 1. 初始化日期
    document.getElementById('update-time').innerText = new Date().toLocaleDateString('zh-TW');

    // 2. FHIR Client 邏輯
    FHIR.oauth2.ready()
        .then(client => {
            document.getElementById('loading-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 300);
            
            const authStatus = document.getElementById('auth-status');
            authStatus.innerText = '已連接 FHIR Server';
            authStatus.className = 'status-tag tag-good';

            client.patient.read().then(p => {
                const name = p.name ? p.name[0].text || p.name[0].family : "匿名病患";
                document.getElementById('patient-name').innerText = name;
                document.getElementById('patient-id').innerText = `FHIR ID: ${p.id}`;
            });

            // 模擬加載數據並繪圖
            renderAllCharts();
            animateNumbers();
            generateEdu();
        })
        .catch(err => {
            console.error(err);
            document.getElementById('loading-overlay').innerHTML = `<p style="color:red">OAuth 驗證失敗，請檢查客戶端設定</p>`;
        });

    // 3. 圖表渲染函數
    function renderMiniChart(id, color, data) {
        const ctx = document.getElementById(id).getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['', '', '', '', ''],
                datasets: [{
                    data: data,
                    borderColor: color,
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: true,
                    backgroundColor: color + '1A', // 10% 透明度
                    tension: 0.4
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { x: { display: false }, y: { display: false } }
            }
        });
    }

    function renderAllCharts() {
        renderMiniChart('hba1cChart', '#10b981', [7.8, 7.5, 7.6, 7.3, 7.2]);
        renderMiniChart('eyeChart', '#f59e0b', [80, 82, 81, 85, 85]);
        renderMiniChart('acrChart', '#ef4444', [60, 62, 65, 67, 68]);
    }

    // 4. 數字動畫
    function animateNumbers() {
        const configs = [
            { id: 'hba1c-val', end: 92 },
            { id: 'eye-val', end: 85 },
            { id: 'acr-val', end: 68 }
        ];
        configs.forEach(conf => {
            let start = 0;
            const step = () => {
                start += 2;
                if(start <= conf.end) {
                    document.getElementById(conf.id).innerText = start;
                    requestAnimationFrame(step);
                } else {
                    document.getElementById(conf.id).innerText = conf.end;
                }
            };
            step();
        });
    }

    // 5. 衛教內容
    function generateEdu() {
        const items = [
            { id: 1, icon: 'fa-apple-alt', title: '飲食控制', content: '建議採取低 GI 飲食，並控制每餐碳水化合物攝取量。' },
            { id: 2, icon: 'fa-running', title: '規律運動', content: '每週建議 150 分鐘中等強度運動，如快走、游泳。' },
            { id: 3, icon: 'fa-eye', title: '定期眼底檢查', content: '糖尿病視網膜病變早期無症狀，每年需檢查一次。' }
        ];
        const grid = document.getElementById('edu-grid');
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'edu-item';
            div.innerHTML = `<i class="fas ${item.icon} fa-lg"></i><h4>${item.title}</h4><p style="font-size:0.8rem; color:var(--text-muted)">查看專業指引...</p>`;
            div.onclick = () => {
                document.getElementById('modal-title').innerText = item.title;
                document.getElementById('modal-content').innerText = item.content;
                document.getElementById('edu-modal').style.display = 'flex';
            };
            grid.appendChild(div);
        });
    }

    function closeModal() { document.getElementById('edu-modal').style.display = 'none'; }
</script>
</body>
</html>
