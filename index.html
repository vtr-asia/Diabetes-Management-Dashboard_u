<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>糖尿病共照網 - 專業品質管理儀表板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-body: #f8fafc;
            --sidebar-width: 260px;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* 側邊導覽列 */
        aside {
            width: var(--sidebar-width);
            background: white;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 50;
        }

        .sidebar-header {
            padding: 24px;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        nav { flex: 1; padding: 12px; }
        nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            text-decoration: none;
            color: var(--text-muted);
            border-radius: 10px;
            transition: all 0.2s ease;
            margin-bottom: 4px;
            font-weight: 500;
        }
        nav a.active, nav a:hover {
            background-color: var(--primary-light);
            color: var(--primary);
        }

        /* 主內容區 */
        main {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 40px;
            max-width: 1400px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        /* 病患資訊區塊 */
        .patient-summary {
            background: white;
            padding: 24px 30px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .avatar-circle {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, var(--primary-light) 0%, #dbeafe 100%);
            color: var(--primary);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .patient-info-main h2 { font-size: 1.25rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .patient-meta { display: flex; gap: 15px; margin-top: 4px; font-size: 0.85rem; color: var(--text-muted); }

        /* 數據指標卡片 */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        .metric-card {
            background: white;
            padding: 24px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            border: 1px solid #f1f5f9;
            transition: transform 0.2s;
        }
        .metric-card:hover { transform: translateY(-4px); }
        .metric-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 16px;
        }

            display: flex;
            align-items: baseline;
            gap: 6
