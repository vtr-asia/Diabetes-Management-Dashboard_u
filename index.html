<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>糖尿病共照網品質儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .transition-all { transition: all 0.4s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 font-sans transition-all" id="body-bg">

    <nav class="bg-slate-900 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-hospital-user text-2xl text-blue-400"></i>
                <span class="text-xl font-bold tracking-tight">Diabetes Management Dashboard</span>
            </div>
            
            <div class="flex items-center bg-slate-800 p-1 rounded-lg border border-slate-700">
                <button onclick="switchPatient('zhao')" id="btn-zhao" class="px-4 py-1 rounded-md text-sm font-bold transition-all bg-red-600 text-white">模擬：趙鐵柱</button>
                <span class="text-slate-600 px-2">|</span>
                <span id="fhir-status" class="text-xs text-blue-400 px-2">FHIR 連線中...</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4">
        
        <div class="bg-white rounded-xl shadow-sm p-6 mb-8 border border-slate-200 flex flex-wrap justify-between items-center transition-all" id="patient-card">
            <div class="flex items-center space-x-6">
                <div id="avatar-box" class="w-20 h-20 rounded-full flex items-center justify-center text-white text-3xl shadow-inner transition-all bg-blue-500">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-bold text-slate-800" id="ui-name">讀取中...</h1>
                    <p class="text-slate-500">FHIR ID: <span id="ui-id" class="font-mono">------</span> | <span id="ui-gender">--</span> | <span id="ui-age">--</span> 歲</p>
                    <div class="mt-2 flex space-x-2" id="ui-tags">
                        <span class="px-2 py-1 bg-blue-100 text-blue-700 text-xs font-bold rounded">FHIR 實時資料</span>
                    </div>
                </div>
            </div>
            <div id="action-buttons" class="mt-4 lg:mt-0">
                <button onclick="handleAction()" id="main-action-btn" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:shadow-lg transition-all font-bold">
                    <i class="fa-solid fa-file-medical mr-2"></i>補開檢查單
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 transition-all border-blue-500" id="card-hba1c">
                        <span class="text-slate-400 font-bold uppercase text-xs tracking-wider">HbA1c (糖化血色素)</span>
                        <div class="mt-4 flex items-baseline">
                            <span class="text-5xl font-black text-slate-800" id="ui-hba1c">--</span>
                            <span class="text-xl text-slate-400 ml-1">%</span>
                        </div>
                        <p class="mt-2 text-sm font-bold transition-all text-slate-500" id="ui-hba1c-msg">● 正在取得最新檢驗值</p>
                    </div>

                    <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 transition-all border-orange-500" id="card-eye">
                        <span class="text-slate-400 font-bold uppercase text-xs tracking-wider">眼底檢查狀態 (Procedure)</span>
                        <div class="mt-4">
                            <span class="text-2xl font-bold text-slate-800" id="ui-eye-status">檢查中</span>
                            <p class="text-slate-400 text-sm" id="ui-eye-date">上次: 查詢中...</p>
                        </div>
                        <div id="ui-eye-alert" class="mt-4 bg-orange-50 text-orange-700 p-2 rounded text-xs" style="display:none">
                            ⚠️ 建議安排年度篩檢
                        </div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-sm">
                    <h3 class="text-slate-800 font-bold mb-4">HbA1c 歷史趨勢 (FHIR Observations)</h3>
                    <canvas id="trendChart" height="100"></canvas>
                </div>
            </div>

            <div class="space-y-6">
                <div id="cds-box" class="p-6 rounded-xl shadow-lg transition-all bg-slate-800 text-white">
                    <h3 class="text-blue-400 font-bold text-xs mb-4 tracking-widest uppercase font-mono tracking-tighter">Clinical Decision Support</h3>
                    <div id="ui-suggestions" class="space-y-4 text-sm">
                        <div class="flex items-start space-x-3">
                            <i class="fa-solid fa-spinner fa-spin text-blue-400 mt-1"></i>
                            <p>正在分析臨床建議...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const CLIENT_ID = "cc344727-6f90-496c-94fd-c7829aa9a51d";
        const CLIENT_SECRET = "79f04b56b33491716c0880af72cdef7d3f0629111421cedd18353651cd313d9e";
        
        let currentChart = null;

        // 1. 初始化 FHIR 流程：處理 OAuth2 Code 並交換 Token
        async function initFHIR() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const fhirIss = sessionStorage.getItem('fhir_iss');
            const tokenUri = sessionStorage.getItem('fhir_token_url');

            if (!code || !fhirIss) {
                document.getElementById('fhir-status').innerText = "未經授權 (請從 launch.html 啟動)";
                return;
            }

            try {
                // 交換 Access Token
                const response = await fetch(tokenUri, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: window.location.origin + window.location.pathname,
                        client_id: CLIENT_ID,
                        client_secret: CLIENT_SECRET
                    })
                });

                const tokenData = await response.json();
                const accessToken = tokenData.access_token;
                const patientId = tokenData.patient;

                document.getElementById('fhir-status').innerText = "已連線至沙盒";
                
                // 抓取病人與檢驗資料
                fetchPatientData(fhirIss, accessToken, patientId);

            } catch (error) {
                console.error("Token exchange failed:", error);
                document.getElementById('fhir-status').innerText = "連線失敗";
            }
        }

        // 2. 從 FHIR Server 獲取資源
        async function fetchPatientData(baseUrl, token, patientId) {
            const headers = { 'Authorization': `Bearer ${token}`, 'Accept': 'application/fhir+json' };

            try {
                // 獲取 Patient 資源
                const pRes = await fetch(`${baseUrl}/Patient/${patientId}`, { headers });
                const patient = await pRes.json();

                // 獲取 HbA1c (LOINC: 4548-4)
                const oRes = await fetch(`${baseUrl}/Observation?patient=${patientId}&code=4548-4&_sort=-date&_count=5`, { headers });
                const obsData = await oRes.json();

                renderPatientUI(patient, obsData);
            } catch (e) {
                console.error("Data fetch error:", e);
            }
        }

        // 3. 將資料渲染至 UI
        function renderPatientUI(patient, obsData) {
            // 基本資料
            const name = patient.name ? (patient.name[0].text || patient.name[0].family) : "未知";
            document.getElementById('ui-name').innerText = name;
            document.getElementById('ui-id').innerText = patient.id;
            document.getElementById('ui-gender').innerText = patient.gender === 'male' ? '男' : '女';
            
            if (patient.birthDate) {
                const age = new Date().getFullYear() - new Date(patient.birthDate).getFullYear();
                document.getElementById('ui-age').innerText = age;
            }

            // 處理檢驗值
            if (obsData.entry && obsData.entry.length > 0) {
                const latest = obsData.entry[0].resource;
                const val = latest.valueQuantity.value;
                const history = obsData.entry.map(e => e.resource.valueQuantity.value).reverse();
                const dates = obsData.entry.map(e => new Date(e.resource.effectiveDateTime).toLocaleDateString()).reverse();

                document.getElementById('ui-hba1c').innerText = val.toFixed(1);
                
                const isHigh = val > 7.0;
                const color = isHigh ? '#ef4444' : '#22c55e';
                
                // 更新顏色
                document.getElementById('card-hba1c').style.borderTopColor = color;
                document.getElementById('ui-hba1c-msg').innerText = isHigh ? "● 遠高於目標值 (7.0%)" : "● 控制達成目標";
                document.getElementById('ui-hba1c-msg').className = `mt-2 text-sm font-bold ${isHigh ? 'text-red-600' : 'text-green-600'}`;

                // 更新圖表
                updateChart(history, dates, color);

                // 更新 CDS 建議
                const sugBox = document.getElementById('ui-suggestions');
                const suggestions = isHigh ? ["檢測到 HbA1c 異常", "建議調整用藥 (加入 SGLT2i)", "安排營養師衛教"] : ["目前控制良好", "維持年度篩檢計畫"];
                sugBox.innerHTML = suggestions.map(s => `<div class="flex items-start space-x-3"><i class="fa-solid fa-circle-info text-blue-400 mt-1"></i><p>${s}</p></div>`).join('');
            }
        }

        function updateChart(data, labels, color) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            if (currentChart) currentChart.destroy();
            currentChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels || ['Q1', 'Q2', 'Q3', 'Q4'],
                    datasets: [{
                        label: 'HbA1c %',
                        data: data,
                        borderColor: color,
                        backgroundColor: color + '22',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });
        }

        function handleAction() {
            alert("已成功向沙盒發送 ServiceRequest！後續將與您聯繫測試時間。");
        }

        // 網頁載入後啟動 FHIR 邏輯
        window.onload = initFHIR;
    </script>
</body>
</html>
